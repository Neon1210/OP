<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <header class="site-header">
      <p class="eyebrow">Interactive Profiles</p>
      <h1>Choose a Person</h1>
      <p class="subhead">
        Hover to reveal a name. Click a profile card to open that person’s video page.
      </p>
    </header>

    <main>
      <section id="people-grid" class="people-grid" aria-label="People"></section>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
